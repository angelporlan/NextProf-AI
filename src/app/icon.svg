<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Branding gradient matching from-sky-400 to-indigo-500 -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#6366f1" />
    </linearGradient>
    
    <!-- Subtle premium glow effect for the sparkles -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#4f46e5" flood-opacity="0.25" />
    </filter>
  </defs>

  <!-- iOS-style Squircle background -->
  <rect width="512" height="512" rx="140" fill="url(#bg-grad)" />

  <!-- Centered vector Sparkles (Lucide-inspired premium filled stars) -->
  <g fill="#ffffff" filter="url(#glow)" transform="translate(64, 64) scale(16)">
    <!-- Central Large Sparkle -->
    <path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z" />
    
    <!-- Top-Left Sparkle -->
    <path d="m5 3 1 2.5L8.5 6 6 7 5 9.5 4 7 1.5 6 4 5.5z" />
    
    <!-- Bottom-Right Sparkle -->
    <path d="m19 17 1 2.5 2.5.5-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1z" />
  </g>
</svg>
